name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gem:
    name: Gem (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Supported Rubies: 3.4 (minimum) and 4.0.
        ruby: ["3.4", "4.0"]
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Rust: formatting + lints (clippy needs Ruby headers via rb-sys, so it
      # runs here after setup-ruby).
      - name: rustfmt
        run: cargo fmt --manifest-path ext/yrb_lite/Cargo.toml -- --check
      - name: clippy
        run: cargo clippy --manifest-path ext/yrb_lite/Cargo.toml --all-targets -- -D warnings
      - name: cargo test (Rust unit tests)
        run: cargo test --manifest-path ext/yrb_lite/Cargo.toml

      # Ruby: build the extension, run the test suite, lint.
      - name: compile
        run: bundle exec rake compile
      - name: test
        run: bundle exec rake test
      - name: rubocop
        run: bundle exec rubocop

  eslint:
    name: Demo JS (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/actioncable-demo/frontend
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx eslint .

  client:
    name: yrb-lite-client (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    defaults:
      run:
        working-directory: packages/yrb-lite-client
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm test

  demo:
    name: Demo e2e (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4", "4.0"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y libpq-dev
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2

      # Build + install the gem exactly as a fresh checkout would.
      - name: Build the gem
        run: bundle exec rake compile

      # The demo is a separate bundle that depends on the path gem. This checks
      # that `bundle install` + `db:prepare` work clean-room, with no
      # broken-toolchain workarounds; the real Rails migration creates the
      # Postgres schema.
      - name: Demo install + db:prepare
        working-directory: examples/actioncable-demo
        run: |
          bundle install
          bin/rails db:prepare
      - name: Build yrb-lite-client package
        working-directory: packages/yrb-lite-client
        run: npm ci && npm run build
      - name: Build frontend bundle
        working-directory: examples/actioncable-demo/frontend
        run: bun install && bun run build

      # Run the durability/concurrency suite against a Postgres-backed durable
      # store under Puma (threaded). Then the concurrent real-browser test, which
      # the headless suites can't substitute for: they drive yjs directly, so
      # they can't catch editor-binding regressions (e.g. a duplicate-yjs bundle
      # that breaks y-prosemirror). It drives four real Chrome instances through
      # agent-browser — separate sessions typing into one doc at once — and
      # asserts byte-for-byte convergence with every keystroke accounted for.
      - name: E2e — Puma (threaded)
        working-directory: examples/actioncable-demo
        run: |
          SERVER=puma PORT=3777 SERVER_PIDFILE=/tmp/puma.pid frontend/boot_server.sh
          PORT=3777 frontend/e2e_suite.sh
          # agent-browser fetches its native binary on first run; point it at
          # the runner's preinstalled Chrome.
          export AGENT_BROWSER_EXECUTABLE_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser)"
          PORT=3777 BROWSERS=4 PER=15 node frontend/agent_browsers.mjs
          kill "$(cat /tmp/puma.pid)" || true

      # Re-run the same durability/concurrency slice under Falcon's fiber
      # scheduler (single-process, --count 1). The native extension releases the
      # GVL for CRDT work and the concern serializes store writes with a Ruby
      # Mutex; this proves both behave correctly inside a fiber reactor — no
      # deadlock, no lost updates, store stays exactly-once — not just under
      # Puma's thread pool. Different port so the Puma teardown can't race it.
      - name: E2e — Falcon (fiber scheduler)
        working-directory: examples/actioncable-demo
        run: |
          SERVER=falcon PORT=3778 SERVER_PIDFILE=/tmp/falcon.pid frontend/boot_server.sh
          PORT=3778 frontend/e2e_suite.sh
          kill "$(cat /tmp/falcon.pid)" || true
