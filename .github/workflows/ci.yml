name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gem:
    name: Gem (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Supported Rubies: 3.4 (minimum) and 4.0.
        ruby: ["3.4", "4.0"]
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Rust: formatting + lints (clippy needs Ruby headers via rb-sys, so it
      # runs here after setup-ruby).
      - name: rustfmt
        run: cargo fmt --manifest-path ext/yrb_lite/Cargo.toml -- --check
      - name: clippy
        run: cargo clippy --manifest-path ext/yrb_lite/Cargo.toml --all-targets -- -D warnings
      - name: cargo test (Rust unit tests)
        run: cargo test --manifest-path ext/yrb_lite/Cargo.toml

      # Ruby: build the extension, run the test suite, lint.
      - name: compile
        run: bundle exec rake compile
      - name: test
        run: bundle exec rake test
      - name: rubocop
        run: bundle exec rubocop

  eslint:
    name: Demo JS (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/actioncable-demo/frontend
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx eslint .

  client:
    name: yrb-lite-client (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    defaults:
      run:
        working-directory: packages/yrb-lite-client
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm test

  demo:
    name: Demo e2e (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4", "4.0"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      # The multi-process e2e runs need a shared cable adapter: Puma cluster /
      # Falcon workers / two server processes only see each other's broadcasts
      # through Redis (the in-process `async` adapter can't span processes).
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      CABLE_ADAPTER: redis
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y libpq-dev
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2

      # Build + install the gem exactly as a fresh checkout would.
      - name: Build the gem
        run: bundle exec rake compile

      # The demo is a separate bundle that depends on the path gem. This checks
      # that `bundle install` + `db:prepare` work clean-room, with no
      # broken-toolchain workarounds; the real Rails migration creates the
      # Postgres schema.
      - name: Demo install + db:prepare
        working-directory: examples/actioncable-demo
        run: |
          bundle install
          bin/rails db:prepare
      - name: Build yrb-lite-client package
        working-directory: packages/yrb-lite-client
        run: npm ci && npm run build
      - name: Build frontend bundle
        working-directory: examples/actioncable-demo/frontend
        run: bun install && bun run build

      # Run the durability/concurrency suite against a Postgres-backed durable
      # store under a multi-process Puma cluster (WORKERS=2 + Redis) — a
      # realistic deployment where workers share documents only through the cable
      # adapter and the durable store, not process memory. Then the concurrent
      # real-browser test, which the headless suites can't substitute for: they
      # drive yjs directly, so they can't catch editor-binding regressions (e.g.
      # a duplicate-yjs bundle that breaks y-prosemirror). It drives four real
      # Chrome instances through agent-browser — separate sessions typing into
      # one doc at once — and asserts byte-for-byte convergence with every
      # keystroke accounted for.
      - name: E2e — Puma cluster (2 workers, Redis)
        working-directory: examples/actioncable-demo
        run: |
          SERVER=puma WORKERS=2 PORT=3777 SERVER_PIDFILE=/tmp/puma.pid frontend/boot_server.sh
          PORT=3777 frontend/e2e_suite.sh
          # agent-browser fetches its native binary on first run; point it at
          # the runner's preinstalled Chrome.
          export AGENT_BROWSER_EXECUTABLE_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser)"
          PORT=3777 BROWSERS=4 PER=15 node frontend/agent_browsers.mjs
          kill "$(cat /tmp/puma.pid)" || true

      # Re-run the same slice under a multi-process Falcon deployment (2 fiber
      # reactors + Redis). The native extension releases the GVL for CRDT work
      # and the concern serializes store writes with a Ruby Mutex; this proves
      # both behave correctly inside fiber reactors across processes — no
      # deadlock, no lost updates, durable store intact — not just under Puma's
      # thread pool. Different port so the Puma teardown can't race it.
      - name: E2e — Falcon cluster (2 fiber reactors, Redis)
        working-directory: examples/actioncable-demo
        run: |
          SERVER=falcon WORKERS=2 PORT=3778 SERVER_PIDFILE=/tmp/falcon.pid frontend/boot_server.sh
          PORT=3778 frontend/e2e_suite.sh
          kill "$(cat /tmp/falcon.pid)" || true

      # Two independent server processes (different ports) sharing documents
      # through Redis + the Postgres store — the cross-process guarantee on plain
      # ActionCable (no AnyCable): both processes' server-side replicas stay
      # current and every change is recorded exactly once.
      - name: E2e — cross-process sharing (two processes, Redis)
        working-directory: examples/actioncable-demo
        run: |
          SERVER=puma WORKERS=1 PORT=3781 SERVER_PIDFILE=/tmp/mp1.pid frontend/boot_server.sh
          SERVER=puma WORKERS=1 PORT=3782 SERVER_PIDFILE=/tmp/mp2.pid frontend/boot_server.sh
          PORTS=3781,3782 bun frontend/multiprocess.mjs
          kill "$(cat /tmp/mp1.pid)" "$(cat /tmp/mp2.pid)" || true
